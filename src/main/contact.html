<html lang="en">
	<head>
		<meta charset="UTF-8" />

		<title>abc &amp; sons | Contact</title>
		<link rel="stylesheet" href="styles.css" />
	</head>
	<body data-page="contact">
		<header class="site-header">
			<div class="brand"><a href="index.html">abc &amp; sons</a></div>
			<button
				class="menu-button"
				type="button"
				aria-expanded="false"
				aria-controls="site-nav"

				Menu
			</button>
			<nav id="site-nav" class="site-nav">
				<a href="index.html">Home</a>
				<a href="about.html">About Us</a>

		<main class="page-section contact-layout">
			<div>
				<h1>Contact</h1>
				<p>
					Reach out to discuss a project, request information, or start a
					conversation.
				</p>
				<p>Email: hello@asteriongroup.com</p>
				<p>Phone: +1 555 014 2026</p>

				<textarea name="message" rows="5" placeholder="Message"></textarea>
				<button class="button primary" type="button">Send</button>
