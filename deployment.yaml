apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-site-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-site
  template:
    metadata:
      labels:
        app: abc-site
    spec:
      containers:
        - name: abc-site
          image: abc-site:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
